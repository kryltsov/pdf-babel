# PDF Translator Configuration
# This file controls translation behavior for the pdf_translator pipeline.

# --- Languages ---
source_language: Ukrainian
target_language: English

# --- Document type ---
# Affects which medical dictionaries are loaded.
# Options: blood_test, urine_test, breast_ultrasound, pet_ct, immunohistochemistry, mri, general_medical
document_type: mri

# --- Instructions for Claude ---
# Free-text guidance that Claude will follow when doing LLM-assisted translation.
instructions: |
  This is a Ukrainian MRI radiology report being translated to English.
  Patient and doctor names are proper nouns and must be transliterated (not translated).
  Keep vertebral level codes (L2, L3, L4, L5, S1, Th11-12, L2-3, L4-5, L5-S1) unchanged.
  Keep imaging sequence codes (T1, T2, T2-weighted, etc.) in English form.
  Keep "Modic" grading unchanged; use "stage" for "ст." (степінь).
  Use decimal point (not comma) in measurements; use "x" (not Cyrillic х) between dimensions.
  Use standard radiology terminology: femoral head, acetabulum, labrum, dural sac,
  ligamentum flavum, zygapophyseal/facet joints, spondylosis, spondyloarthrosis, etc.

# --- Header zone ---
# These MRI PDFs have no clinic letterhead; body content starts near the top.
header_detection: fixed
header_fixed_y: 0
header_first_page_only: false

# --- Preserve zones ---
preserve_zones:
  - header
  - rotated

# --- Person name translation ---
name_translations:
  "Крильцов І.В.": "Kryltsov I.V."
  "Браташ Л.А.": "Bratash L.A."

# --- Do not translate ---
do_not_translate: []

# --- Do not translate patterns ---
do_not_translate_patterns:
  - "^\\d{6,}$"
  - "^\\d{2}\\.\\d{2}\\.\\d{4}$"
  - "^[A-Z][A-Z0-9\\-#%]*$"
  - "^https?://"
  # MRI vertebral level codes (e.g. L2-3, L5-S1, Th11-12)
  - "^(?:L|S|Th|C)\\d+(?:-(?:L|S|Th|C)?\\d+)?\\.?$"

# --- Custom translations ---
custom_translations: {}

# --- Phrase translations ---
phrase_translations: {}
